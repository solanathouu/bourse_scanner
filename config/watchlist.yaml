# Parametres du scanner
scoring:
  threshold: 0.50          # Score bas volontairement: on envoie TOUT pour que le feedback loop apprenne
  cooldown_hours: 24       # Heures entre 2 alertes sur le meme ticker
  model_path: "data/models/nicolas_v1.joblib"

scheduler:
  prices_interval_min: 2       # Refresh prix toutes les 2 min
  news_interval_min: 10        # Collecte news RSS toutes les 10 min
  scoring_interval_min: 60     # Scoring toutes les 60 min
  fundamentals_hour: 7         # Refresh fondamentaux a 7h
  alpha_vantage_hour: 8        # Alpha Vantage news a 8h
  marketaux_hour: 12           # Marketaux news a 12h
  newsdata_hour: 14            # Newsdata.io news a 14h
  sentiment_interval_min: 120  # Scoring LLM sentiment toutes les 2h
  orderbook_interval_min: 15   # Carnet d'ordres toutes les 15 min

market_hours:
  open: "09:00"
  close: "17:35"
  scoring_open: "09:30"
  scoring_close: "17:30"
  timezone: "Europe/Paris"

# Feedback loop
feedback:
  review_hour: 18          # Review J+3 a 18h
  rules_update_hour: 18    # Mise a jour regles a 18h30
  weekly_day: "sun"         # Resume hebdo le dimanche
  weekly_hour: 20           # A 20h
  retrain_day: "sun"        # Check retrain le dimanche
  retrain_hour: 19          # A 19h
  win_threshold: 4.5        # % pour considerer un WIN
  min_reviews_retrain: 20   # Reviews minimum pour retrain
